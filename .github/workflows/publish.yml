name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install npm 11 via corepack (required for OIDC Trusted Publishing)
        run: |
          corepack enable
          corepack prepare npm@11 --activate
          npm --version

      - name: Create minimal .npmrc for OIDC (no _authToken)
        run: echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
