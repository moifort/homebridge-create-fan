name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20 (working npm, no 22.22.2 bundle bug)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Upgrade npm to v11 (required for OIDC Trusted Publishing)
        run: |
          npm install -g npm@11
          npm --version

      - name: Create minimal .npmrc for OIDC (no _authToken)
        run: echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
